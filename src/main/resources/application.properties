jwt.access.secret=${JWT_ACCESS_SECRET}
jwt.access.expiration-ms=${JWT_ACCESS_EXPIRATION}
jwt.refresh.secret=${JWT_REFRESH_SECRET}
jwt.refresh.expiration-ms=${JWT_REFRESH_EXPIRATION}

spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=8443
server.ssl.enabled=true
server.ssl.key-store=classpath:server.pfx
server.ssl.key-store-password=${SSL_PASSWORD}
server.ssl.key-store-type=PKCS12

license.ticket.secret=${LICENSE_TICKET_SECRET}
license.keystore.path=server.pfx
license.keystore.password=${LICENSE_KEYSTORE_PASSWORD}
license.key.alias=${LICENSE_KEY_ALIAS}
license.signature.algorithm=SHA256withRSA

server.servlet.session.cookie.same-site=lax

logging.level.org.springframework.security=DEBUG
